<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator LI Kresna</title>
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.49.1/build/docxtemplater.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --panel-dark: #131a30;
            --neon-blue: #00f2fe;
            --neon-purple: #4facfe;
            --text-light: #e2e8f0;
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 500px; background: var(--panel-dark); padding: 30px; border-radius: 16px; box-shadow: 0 0 30px rgba(0, 242, 254, 0.15); border: 1px solid rgba(0, 242, 254, 0.2); }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; }
        textarea { width: 100%; height: 250px; background: #070b14; border: 1px solid #222f54; border-radius: 8px; color: #fff; padding: 15px; box-sizing: border-box; resize: vertical; margin-bottom: 15px; }
        .btn-neon { display: block; width: 100%; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: #000; font-weight: bold; padding: 14px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-neon:hover { box-shadow: 0 0 20px var(--neon-blue); }
        .loading, .result-box { display: none; text-align: center; margin-top: 20px; }
        .btn-download { display: inline-block; background: #00e676; color: #000; padding: 12px 30px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-terminal"></i> GENERATOR LAPORAN</h2>
    <p style="text-align: center; color: #718096; font-size:12px;">Versi Cloud Website</p>
    
    <textarea id="narasiInput" placeholder="Tempel narasi dari KRESNA AI di sini..."></textarea>
    
    <button class="btn-neon" onclick="generateDocument()">
        <i class="fas fa-file-invoice"></i> GENERATE LAPORAN
    </button>
    
    <div class="loading" id="loading">
        <i class="fas fa-spinner fa-spin"></i> Memproses...
    </div>
    
    <div class="result-box" id="resultBox">
        <h3 style="color:#00e676">GENERATE BERHASIL!</h3>
        <a id="linkDownloadDocx" href="#" class="btn-download">DOWNLOAD DOCX</a>
    </div>
</div>

<script>
function bersihkanDanUraiKresna(text) {
    let textClean = text.replace(/\[[^\]]+\]\s*KRESNA AI:\s*/g, '').replace(/KRESNA AI:\s*/g, '');
    const data = {};
    const now = new Date();
    const hariList = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
    const bulanList = ["", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    
    // Logika Tanggal/Hari Baru
    data['WAKTU'] = `${hariList[now.getDay()]}, ${now.getDate()} ${bulanList[now.getMonth() + 1]} ${now.getFullYear()} Pukul ${String(now.getHours()).padStart(2, '0')}.${String(now.getMinutes()).padStart(2, '0')} WIB`;
    data['TANGGAL_TTD'] = `${now.getDate()} ${bulanList[now.getMonth() + 1]} ${now.getFullYear()}`;
    
    function ambilPola(regex, src) {
        const m = src.match(regex);
        return m ? m[1].trim() : "";
    }
    
    data['BIDANG'] = ambilPola(/Bidang\s*:\s*(.*)/, textClean);
    data['PERIHAL'] = ambilPola(/Perihal\s*:\s*(.*)/, textClean);
    data['SUMBER'] = ambilPola(/A\.\s*Sumber Informasi\s*:\s*(.*)/, textClean);
    data['HUBUNGAN'] = ambilPola(/B\.\s*Hubungan dengan Sumber\s*:\s*(.*)/, textClean);
    data['CARA'] = ambilPola(/C\.\s*Cara mendapatkan Informasi\s*:\s*(.*)/, textClean);
    data['NILAI'] = ambilPola(/E\.\s*Nilai Informasi\s*:\s*(.*)/, textClean);
    
    const faktaBlock = ambilPola(/II\.\s*FAKTA-FAKTA([\s\S]*?)III\.\s*PENDAPAT/, textClean);
    if (faktaBlock) {
        data['FAKTA_A'] = ambilPola(/A\.\s*([\s\S]*?)(?=B\.\s*|$)/, faktaBlock);
        data['FAKTA_B'] = ambilPola(/B\.\s*([\s\S]*?)(?=C\.\s*|$)/, faktaBlock);
        data['FAKTA_C'] = ambilPola(/C\.\s*([\s\S]*)/, faktaBlock);
    } else {
        data['FAKTA_A'] = data['FAKTA_B'] = data['FAKTA_C'] = "";
    }
    
    const pendapatBlock = ambilPola(/III\.\s*PENDAPAT PELAPOR([\s\S]*)/, textClean);
    if (pendapatBlock) {
        const abjad = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        for (let i = 0; i < abjad.length; i++) {
            const char = abjad[i];
            const nextChar = abjad[i+1];
            const reg = nextChar ? new RegExp(`${char}\\.\\s*([\\s\\S]*?)(?=${nextChar}\\.\\s*|$)`) : new RegExp(`${char}\\.\\s*([\\s\\S]*)`);
            data[`PENDAPAT_${char}`] = ambilPola(reg, pendapatBlock);
        }
    } else {
        for (let char of ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H']) { data[`PENDAPAT_${char}`] = ""; }
    }
    return data;
}

async function generateDocument() {
    const text = document.getElementById('narasiInput').value;
    if(!text) return alert("Masukkan narasi!");
    
    document.getElementById('loading').style.display = 'block';
    try {
        const response = await fetch('./format_original.docx');
        const arrayBuffer = await response.arrayBuffer();
        const zip = new PizZip(arrayBuffer);
        const doc = new window.docxtemplater(zip, {delimiters: {start: '{{', end: '}}'}, paragraphLoop: true, linebreaks: true});
        
        doc.setData(bersihkanDanUraiKresna(text));
        doc.render();
        
        const out = doc.getZip().generate({type: "blob"});
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultBox').style.display = 'block';
        
        const downloadBtn = document.getElementById('linkDownloadDocx');
        downloadBtn.onclick = (e) => { e.preventDefault(); window.saveAs(out, "Laporan_Kresna.docx"); };
    } catch (e) { alert("Error: " + e.message); document.getElementById('loading').style.display = 'none'; }
}
</script>
</body>
</html>
