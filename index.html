<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Generator LI Kresna</title>
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.49.1/build/docxtemplater.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0f1d; color: white; padding: 20px; text-align: center; }
        textarea { width: 100%; max-width: 500px; height: 250px; background: #070b14; color: white; border: 1px solid #00f2fe; padding: 10px; }
        button { padding: 15px 30px; margin-top: 20px; cursor: pointer; background: #00f2fe; border: none; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>GENERATOR LAPORAN (FIXED)</h2>
    <textarea id="narasiInput" placeholder="Tempel narasi dari Kresna AI..."></textarea><br>
    <button onclick="generateDocument()">GENERATE LAPORAN</button>

    <script>
        async function generateDocument() {
            const text = document.getElementById('narasiInput').value;
            const now = new Date();
            const hariList = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const bulanList = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const tanggalSekarang = `${hariList[now.getDay()]}, ${now.getDate()} ${bulanList[now.getMonth()]} ${now.getFullYear()}`;

            try {
                const response = await fetch('./format_original.docx');
                const arrayBuffer = await response.arrayBuffer();
                const zip = new PizZip(arrayBuffer);
                const doc = new window.docxtemplater(zip, {delimiters: {start: '{{', end: '}}'}});
                
                // Data yang akan mengisi placeholder di Word
                doc.setData({
                    WAKTU: tanggalSekarang, // Ini akan mengganti {{WAKTU}} di Word
                    BIDANG: text.match(/Bidang\s*:\s*(.*)/)?.[1] || "Data tidak ditemukan"
                });
                doc.render();
                
                const out = doc.getZip().generate({type: "blob"});
                window.saveAs(out, "Laporan_Hasil.docx");
            } catch (e) { alert("Error: " + e.message); }
        }
    </script>
</body>
</html>
