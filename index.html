<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Generator LI Kresna</title>
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.49.1/build/docxtemplater.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0a0f1d;
            --panel-dark: #131a30;
            --neon-blue: #00f2fe;
            --neon-purple: #4facfe;
            --text-light: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark); color: var(--text-light);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 95%; max-width: 500px; background: var(--panel-dark);
            padding: 30px; border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
            border: 1px solid rgba(0, 242, 254, 0.2);
        }
        h2 {
            text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px;
        }
        textarea {
            width: 100%; height: 250px; background: #070b14; border: 1px solid #222f54;
            border-radius: 8px; color: #fff; padding: 15px; font-size: 14px; resize: vertical;
        }
        textarea:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        .btn-neon {
            display: block; width: 100%; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: #000; font-weight: bold; text-transform: uppercase; padding: 14px; border: none;
            border-radius: 8px; cursor: pointer; font-size: 15px; transition: all 0.3s ease; margin-top: 15px;
        }
        .btn-neon:hover { box-shadow: 0 0 20px var(--neon-blue); transform: translateY(-2px); }
        .btn-neon:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .loading { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: var(--neon-blue); }
        .result-box {
            display: none; text-align: center; background: #0d1527; padding: 20px; border-radius: 8px;
            border: 1px dashed var(--neon-blue); margin-top: 20px;
        }
        .btn-download {
            display: inline-block; background: #00e676; color: #000; padding: 12px 30px;
            border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 10px;
            transition: 0.2s; text-transform: uppercase; font-size: 14px; cursor: pointer; border: none;
        }
        .btn-download:hover { box-shadow: 0 0 15px #00e676; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-terminal"></i> LI Generator</h2>
        <div style="text-align: center; margin-top: -5px; margin-bottom: 25px;">
            <div style="display: inline-block; width: 30px; height: 20px; border: 1px solid #cbd5e1; box-sizing: border-box; vertical-align: middle;">
                <div style="background-color: #ff0000; height: 50%;"></div>
                <div style="background-color: #ffffff; height: 50%;"></div>
            </div>
            <p style="color: #a0aec0; font-size: 12px; font-weight: bold; margin: 0 0 8px 0;">Dragon Fly | AIPDA | 86020832</p>
        </div>
        <p style="color: #a0aec0; font-size: 14px; margin-bottom: 10px;">Khusus Tempel hasil Buat LI dari KRESNA AI di bawah ini:</p>
        <p style="color: #ff0000; font-size: 10px; margin-bottom: 8px; font-weight: bold;">[Hapus dulu tanda seperti ini = [6/23/2026 1:34 AM] KRESNA AI]</p>
        <textarea id="narasiInput" placeholder="Tempel teks laporan di sini..."></textarea>
        <button class="btn-neon" onclick="generateDocument()"><i class="fas fa-file-invoice"></i> GENERATE</button>
        <div class="loading" id="loading"><i class="fas fa-spinner fa-spin"></i> Memproses Dokumen Word di Browser...</div>
        <div class="result-box" id="resultBox">
            <i class="fas fa-check-circle fa-3x" style="color: #00e676; margin-bottom:10px;"></i>
            <h3>GENERATE BERHASIL!</h3>
            <p style="color: #a0aec0; font-size: 13px; margin-top:-10px; margin-bottom: 20px;">Dokumen Laporan Informasi siap diunduh.</p>
            <a id="linkDownloadDocx" href="#" class="btn-download"><i class="fas fa-file-word"></i> DOWNLOAD DOCX</a>
        </div>
    </div>

    <script>
        function bersihkanDanUraiKresna(text) {
            let textClean = text;
            // Cari "Bidang :" terakhir
            const bidangRegex = /\bBidang\s*:/g;
            let match, lastIdx = -1;
            while ((match = bidangRegex.exec(text)) !== null) lastIdx = match.index;
            if (lastIdx !== -1) textClean = text.substring(lastIdx);
            // Hapus timestamp & label KRESNA AI
            textClean = textClean.replace(/\[[^\]]+\]\s*KRESNA AI:\s*/g, '').replace(/KRESNA AI:\s*/g, '');

            const data = {};
            const now = new Date();
            const hariList = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
            const bulanList = ["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
            const hariIni = hariList[now.getDay()];
            const tgl = now.getDate(), bln = bulanList[now.getMonth()+1], thn = now.getFullYear();
            const jam = String(now.getHours()).padStart(2,'0'), menit = String(now.getMinutes()).padStart(2,'0');
            data['WAKTU'] = `${hariIni}, ${tgl} ${bln} ${thn} Pukul ${jam}.${menit} WIB`;
            data['TANGGAL_TTD'] = `${tgl} ${bln} ${thn}`;
            const romawiList = ["","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
            data['BULAN_ROMAWI'] = romawiList[now.getMonth()+1];
            data['TAHUN'] = thn.toString();

            function ambilPola(regex, src) { const m = src.match(regex); return m ? m[1].trim() : ""; }

            data['BIDANG'] = ambilPola(/Bidang\s*:\s*(.*)/, textClean);
            data['PERIHAL'] = ambilPola(/Perihal\s*:\s*(.*)/, textClean);
            data['SUMBER'] = ambilPola(/A\.\s*Sumber Informasi\s*:\s*(.*)/, textClean);
            data['HUBUNGAN'] = ambilPola(/B\.\s*Hubungan dengan Sumber\s*:\s*(.*)/, textClean);
            data['CARA'] = ambilPola(/C\.\s*Cara mendapatkan Informasi\s*:\s*(.*)/, textClean);
            data['NILAI'] = ambilPola(/E\.\s*Nilai Informasi\s*:\s*(.*)/, textClean);

            const faktaBlock = ambilPola(/II\.\s*FAKTA-FAKTA([\s\S]*?)III\.\s*PENDAPAT/, textClean);
            if (faktaBlock) {
                data['FAKTA_A'] = ambilPola(/(?:^|[\n\r])\s*A\.\s*([\s\S]*?)(?=(?:[\n\r]\s*B\.\s*)|$)/, faktaBlock);
                data['FAKTA_B'] = ambilPola(/(?:^|[\n\r])\s*B\.\s*([\s\S]*?)(?=(?:[\n\r]\s*C\.\s*)|$)/, faktaBlock);
                data['FAKTA_C'] = ambilPola(/(?:^|[\n\r])\s*C\.\s*([\s\S]*)/, faktaBlock);
            } else {
                data['FAKTA_A'] = data['FAKTA_B'] = data['FAKTA_C'] = "";
            }

            // ========== PENDAPAT PELAPOR – PARSING BARU (split per poin) ==========
            const pendapatBlockRaw = ambilPola(/III\.\s*PENDAPAT PELAPOR([\s\S]*)/, textClean);
            const pendapatList = [];
            if (pendapatBlockRaw) {
                let cleanBlock = pendapatBlockRaw;
                const endPatterns = [
                    /\nIV\.\s/, /\nDemikian\s/, /\nDibuat\s/, /\nDikeluarkan\s/,
                    /\nMengetahui\s/, /\nAn\.\s/, /\na\.n\.\s/, /\nTTD\s/, /\nTembusan\s/
                ];
                let cutIndex = cleanBlock.length;
                for (const pat of endPatterns) {
                    const m = cleanBlock.match(pat);
                    if (m && m.index < cutIndex) cutIndex = m.index;
                }
                cleanBlock = cleanBlock.substring(0, cutIndex);

                // Pisahkan berdasarkan newline yang diikuti huruf besar + titik + spasi
                const parts = cleanBlock.split(/\n(?=[A-Z]\.\s)/);
                for (const part of parts) {
                    const m = part.match(/^([A-Z])\.\s+([\s\S]*)/);
                    if (m && m[2].trim()) {
                        pendapatList.push({ char: m[1], isi: m[2].trim() });
                    }
                }
            }
            data['pendapatList'] = pendapatList;

            // Isi placeholder PENDAPAT_A s/d PENDAPAT_Z (kosongkan yang tidak ada)
            const abjad = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            for (let i = 0; i < abjad.length; i++) {
                const char = abjad[i];
                const item = pendapatList.find(p => p.char === char);
                data[`PENDAPAT_${char}`] = item ? item.isi : "";
            }
            return data;
        }

        async function generateDocument() {
            const text = document.getElementById('narasiInput').value;
            if (!text) return alert("Harap masukkan narasi terlebih dahulu.");
            const generateBtn = document.querySelector('.btn-neon');
            const originalBtnHtml = generateBtn.innerHTML;
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memeriksa Izin Lokasi...';

            let lokasiName = "Lokasi Tidak Diketahui";
            try {
                const position = await new Promise((resolve, reject) => {
                    if (!navigator.geolocation) reject(new Error("Geolokasi tidak didukung"));
                    else navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
                });
                document.getElementById('loading').style.display = 'block';
                document.getElementById('resultBox').style.display = 'none';
                generateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sedang Memproses...';

                const { latitude: lat, longitude: lon } = position.coords;
                try {
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                    const geoData = await geoRes.json();
                    if (geoData?.address) {
                        lokasiName = geoData.address.city || geoData.address.regency || geoData.address.county || geoData.address.town || geoData.address.state_district || "Lokasi Tidak Diketahui";
                        lokasiName = lokasiName.replace(/^(Kabupaten\s+|Kota Administrasi\s+|Kota\s+)/i, '').trim();
                    }
                } catch (e) { console.error(e); }
            } catch (err) {
                alert("Izin lokasi wajib diberikan untuk melakukan generate dokumen.");
                generateBtn.disabled = false;
                generateBtn.innerHTML = originalBtnHtml;
                return;
            }

            try {
                const response = await fetch('./format_original.docx');
                if (!response.ok) throw new Error("File format tidak ditemukan.");
                const arrayBuffer = await response.arrayBuffer();
                const dataKomponen = bersihkanDanUraiKresna(text);
                dataKomponen['LOKASI'] = lokasiName;

                const zip = new PizZip(arrayBuffer);
                // ========== MODIFIKASI XML: HAPUS SEMUA PARAGRAF PENDAPAT LALU BUAT ULANG ==========
                try {
                    let docXmlText = zip.file("word/document.xml").asText();
                    const paragraphs = [];
                    const pRegex = /<w:p(?:\s[^>]*?)?>[\s\S]*?<\/w:p>/g;
                    let m;
                    while ((m = pRegex.exec(docXmlText)) !== null) {
                        paragraphs.push({ xml: m[0], start: m.index, end: m.index + m[0].length });
                    }

                    // Temukan SEMUA paragraf yang mengandung "PENDAPAT_"
                    const pendapatIndices = [];
                    for (let i = 0; i < paragraphs.length; i++) {
                        if (paragraphs[i].xml.includes('PENDAPAT_')) {
                            pendapatIndices.push(i);
                        }
                    }

                    if (pendapatIndices.length > 0 && dataKomponen.pendapatList.length > 0) {
                        const firstIdx = pendapatIndices[0];
                        const lastIdx = pendapatIndices[pendapatIndices.length - 1];
                        // Perluas hingga paragraf kosong setelah lastIdx (untuk spasi)
                        let endBoundary = paragraphs[lastIdx].end;
                        for (let k = lastIdx + 1; k < paragraphs.length; k++) {
                            const txt = paragraphs[k].xml.replace(/<[^>]+>/g, '').trim();
                            if (txt === '') {
                                endBoundary = paragraphs[k].end;
                            } else {
                                break;
                            }
                        }

                        // Ambil template paragraf pertama sebagai pola
                        const templatePXml = paragraphs[firstIdx].xml;

                        // Bangun ulang XML untuk semua poin pendapat
                        let generatedXml = '';
                        const emptyPXml = '<w:p><w:pPr><w:spacing w:after="0"/></w:pPr></w:p>';
                        for (let j = 0; j < dataKomponen.pendapatList.length; j++) {
                            const item = dataKomponen.pendapatList[j];
                            let newPXml = templatePXml.replace(/PENDAPAT_[A-Z]/g, `PENDAPAT_${item.char}`);
                            // Ganti karakter hardcoded (A. -> B. dst.)
                            const tplCharMatch = templatePXml.match(/PENDAPAT_([A-Z])/);
                            if (tplCharMatch) {
                                const tplChar = tplCharMatch[1];
                                const hardRx = new RegExp(`(<w:t[^>]*>[\\s\\u00A0]*)${tplChar}(\\.)`, 'g');
                                newPXml = newPXml.replace(hardRx, `$1${item.char}$2`);
                            }
                            generatedXml += newPXml;
                            if (j < dataKomponen.pendapatList.length - 1) {
                                generatedXml += emptyPXml; // spasi antar poin
                            }
                        }
                        // Tambahkan satu paragraf kosong di akhir
                        generatedXml += emptyPXml;

                        // Hapus blok lama dan sisipkan yang baru
                        docXmlText = docXmlText.substring(0, paragraphs[firstIdx].start) +
                                     generatedXml +
                                     docXmlText.substring(endBoundary);

                        zip.file("word/document.xml", docXmlText);
                    }
                } catch (xmlErr) {
                    console.error("XML mod error:", xmlErr);
                }

                const doc = new window.docxtemplater(zip, {
                    delimiters: { start: "{{", end: "}}" },
                    paragraphLoop: true,
                    linebreaks: true
                });
                doc.setData(dataKomponen);
                doc.render();

                const out = doc.getZip().generate({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultBox').style.display = 'block';
                const newDlBtn = document.getElementById('linkDownloadDocx').cloneNode(true);
                document.getElementById('linkDownloadDocx').parentNode.replaceChild(newDlBtn, document.getElementById('linkDownloadDocx'));
                newDlBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    saveAs(out, "Laporan_Informasi_Kresna.docx");
                    setTimeout(() => location.reload(), 1000);
                });
            } catch (error) {
                alert("Terjadi Kesalahan: " + error.message);
                console.error(error);
                document.getElementById('loading').style.display = 'none';
                generateBtn.disabled = false;
                generateBtn.innerHTML = originalBtnHtml;
            }
        }
    </script>
</body>
</html>
