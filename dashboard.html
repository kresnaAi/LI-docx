<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator LI - Serverless Kresna AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.49.1/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --panel-dark: #131a30;
            --neon-blue: #00f2fe;
            --neon-purple: #4facfe;
            --text-light: #e2e8f0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background: var(--panel-dark);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
            border: 1px solid rgba(0, 242, 254, 0.2);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #070b14;
            border: 1px solid #222f54;
            border-radius: 8px;
            color: #fff;
            padding: 15px;
            box-sizing: border-box;
            font-size: 14px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }
        .btn-neon {
            display: block;
            width: 100%;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-shadow: 0 0 2px rgba(255,255,255,0.5);
            margin-top: 15px;
        }
        .btn-neon:hover {
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-2px);
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            color: var(--neon-blue);
        }
        .result-box {
            display: none;
            text-align: center;
            background: #0d1527;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed var(--neon-blue);
            margin-top: 20px;
        }
        .btn-download {
            display: inline-block;
            background: #00e676;
            color: #000;
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-download:hover {
            box-shadow: 0 0 15px #00e676;
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-robot"></i> Generator LI Kresna AI</h2>
    <p style="text-align: center; color: #718096; margin-top:-5px; font-size:13px;">Versi Serverless Cloud - Berjalan 100% di Browser</p>
    
    <label style="font-weight: bold; display: block; margin-bottom: 8px;">Tempel Narasi Kresna AI Di Sini:</label>
    <textarea id="narasiInput" placeholder="Sistem akan otomatis memotong teks dan mengambil komponen mulai dari kata 'Bidang : ' ..."></textarea>
    
    <button class="btn-neon" onclick="generateDocument()">
        <i class="fas fa-cog"></i> JALANKAN GENERATOR
    </button>
    
    <div class="loading" id="loading">
        <i class="fas fa-spinner fa-spin"></i> Sedang memproses dokumen di browser Anda...
    </div>
    
    <div class="result-box" id="resultBox">
        <i class="fas fa-check-circle fa-3x" style="color: #00e676; margin-bottom:10px;"></i>
        <h3>Proses Berhasil!</h3>
        <p style="color: #a0aec0; font-size: 14px; margin-top:-10px;">Dokumen Anda telah selesai dirakit secara instan.</p>
        <a id="linkDownloadDocx" href="#" class="btn-download">
            <i class="fas fa-file-word"></i> UNDUH DOKUMEN (DOCX)
        </a>
    </div>
</div>

<script>
function bersihkanDanUraiKresna(text) {
    // Cari letak baris kata "Bidang :" terakhir
    let textClean = text;
    const bidangRegex = /\bBidang\s*:/g;
    let match;
    let lastIdx = -1;
    while ((match = bidangRegex.exec(text)) !== null) {
        lastIdx = match.index;
    }
    if (lastIdx !== -1) {
        textClean = text.substring(lastIdx);
    }
    
    // Hilangkan prefix bot AI
    textClean = textClean.replace(/\[[^\]]+\]\s*KRESNA AI:\s*/g, '');
    textClean = textClean.replace(/KRESNA AI:\s*/g, '');
    
    const data = {};
    
    // GENERATE WAKTU REALTIME SISTEM
    const now = new Date();
    const hariList = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
    const bulanList = ["", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    
    const hariIni = hariList[now.getDay()];
    const tgl = now.getDate();
    const bln = bulanList[now.getMonth() + 1];
    const thn = now.getFullYear();
    const jam = String(now.getHours()).padStart(2, '0');
    const menit = String(now.getMinutes()).padStart(2, '0');
    
    data['WAKTU'] = `${hariIni}, ${tgl} ${bln} ${thn} Pukul ${jam}.${menit} WIB`;
    data['TANGGAL_TTD'] = `${tgl} ${bln} ${thn}`;
    
    function ambilPola(regex, src) {
        const m = src.match(regex);
        return m ? m[1].trim() : "";
    }
    
    data['BIDANG'] = ambilPola(/Bidang\s*:\s*(.*)/, textClean);
    data['PERIHAL'] = ambilPola(/Perihal\s*:\s*(.*)/, textClean);
    data['SUMBER'] = ambilPola(/A\.\s*Sumber Informasi\s*:\s*(.*)/, textClean);
    data['HUBUNGAN'] = ambilPola(/B\.\s*Hubungan dengan Sumber\s*:\s*(.*)/, textClean);
    data['CARA'] = ambilPola(/C\.\s*Cara mendapatkan Informasi\s*:\s*(.*)/, textClean);
    data['NILAI'] = ambilPola(/E\.\s*Nilai Informasi\s*:\s*(.*)/, textClean);
    
    const faktaBlock = ambilPola(/II\.\s*FAKTA-FAKTA([\s\S]*?)III\.\s*PENDAPAT/, textClean);
    if (faktaBlock) {
        data['FAKTA_A'] = ambilPola(/A\.\s*([\s\S]*?)(?=B\.\s*|$)/, faktaBlock);
        data['FAKTA_B'] = ambilPola(/B\.\s*([\s\S]*?)(?=C\.\s*|$)/, faktaBlock);
        data['FAKTA_C'] = ambilPola(/C\.\s*([\s\S]*)/, faktaBlock);
    } else {
        data['FAKTA_A'] = data['FAKTA_B'] = data['FAKTA_C'] = "";
    }
    
    const pendapatBlock = ambilPola(/III\.\s*PENDAPAT PELAPOR([\s\S]*)/, textClean);
    if (pendapatBlock) {
        const abjad = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        for (let i = 0; i < abjad.length; i++) {
            const char = abjad[i];
            const nextChar = abjad[i+1];
            const reg = nextChar ? new RegExp(`${char}\\.\\s*([\\s\\S]*?)(?=${nextChar}\\.\\s*|$)`) : new RegExp(`${char}\\.\\s*([\\s\\S]*)`);
            data[`PENDAPAT_${char}`] = ambilPola(reg, pendapatBlock);
        }
    } else {
        const abjad = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        for (let char of abjad) { data[`PENDAPAT_${char}`] = ""; }
    }
    
    return data;
}

async function generateDocument() {
    const text = document.getElementById('narasiInput').value;
    if(!text) return alert("Harap masukkan narasi terlebih dahulu.");
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultBox').style.display = 'none';
    
    try {
        // Fetch format_original.docx langsung dari github pages tempat berkas ini berada
        const response = await fetch('./format_original.docx');
        if (!response.ok) throw new Error("Gagal mengunduh berkas 'format_original.docx' dari server GitHub.");
        const arrayBuffer = await response.arrayBuffer();
        
        // Ekstrak data teks pelaporan
        const dataKomponen = bersihkanDanUraiKresna(text);
        
        // Load berkas zip menggunakan PizZip
        const zip = new PizZip(arrayBuffer);
        
        // Inisialisasi engine docxtemplater dengan aturan pembatas tag {{ }}
        const doc = new window.docxtemplater(zip, {
            delimiters: { start: "{{", end: "}}" },
            paragraphLoop: true,
            linebreaks: true
        });
        
        // Suntikkan data
        doc.setData(dataKomponen);
        doc.render();
        
        // Compile menjadi Blob file Word kembali
        const out = doc.getZip().generate({
            type: "blob",
            mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        });
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultBox').style.display = 'block';
        
        // Konfigurasi tombol unduh agar memicu simpan file lokal browser
        const downloadBtn = document.getElementById('linkDownloadDocx');
        const newDownloadBtn = downloadBtn.cloneNode(true);
        downloadBtn.parentNode.replaceChild(newDownloadBtn, downloadBtn);
        
        newDownloadBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.saveAs(out, "Laporan_Informasi_Kresna.docx");
        });
        
    } catch (error) {
        alert("Terjadi Kendala: " + error.message);
        document.getElementById('loading').style.display = 'none';
    }
}
</script>

</body>
</html>
